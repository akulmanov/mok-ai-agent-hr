version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hr-screening-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=hr_screening
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - hr-screening-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: hr-screening-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/hr_screening
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - SCORING_THRESHOLD=${SCORING_THRESHOLD:-0.65}
      - SCORING_HOLD_BAND=${SCORING_HOLD_BAND:-0.10}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hr-screening-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hr-screening-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - hr-screening-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: hr-screening-mailpit
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    restart: unless-stopped
    networks:
      - hr-screening-network

  telegram-bot:
    build: .
    container_name: hr-screening-telegram-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/hr_screening
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    command: python run_telegram_bot.py
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped
    networks:
      - hr-screening-network

networks:
  hr-screening-network:
    driver: bridge

volumes:
  postgres_data:
