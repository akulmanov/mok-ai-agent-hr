version: '3.8'

services:
  api:
    build: .
    container_name: hr-screening-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/hr_screening.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/hr_screening.db}
      - SCORING_THRESHOLD=${SCORING_THRESHOLD:-0.65}
      - SCORING_HOLD_BAND=${SCORING_HOLD_BAND:-0.10}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - hr-screening-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hr-screening-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - hr-screening-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: hr-screening-mailpit
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    restart: unless-stopped
    networks:
      - hr-screening-network

networks:
  hr-screening-network:
    driver: bridge
